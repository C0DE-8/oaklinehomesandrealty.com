<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="../" />
    <title>Admin Login | Oakline Homes and Realty</title>
    <link rel="icon" href="assets/images/branding/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/images/branding/apple-touch-icon.png" />
    <link rel="stylesheet" href="assets/css/oakline.css" />
    <link rel="stylesheet" href="assets/css/admin.css" />
  </head>
  <body class="admin-body" data-admin-page="auth">
    <main class="admin-shell">
      <section class="admin-brand" aria-label="Oakline Homes and Realty">
        <div>
          <img src="assets/images/branding/main-logo.png" alt="Oakline Homes and Realty" />
          <h1>Admin Portal</h1>
          <p>Protected access for Oakline administrators.</p>
        </div>
        <p class="admin-footnote">Manage listings, agents, leads, and account access.</p>
      </section>

      <section class="admin-main">
        <div class="admin-panel">
          <div class="admin-panel-header">
            <h2>Admin Access</h2>
          </div>

          <div class="admin-tabs" role="tablist" aria-label="Admin forms">
            <button class="admin-tab is-active" type="button" data-admin-tab="login">Login</button>
            <button class="admin-tab" type="button" data-admin-tab="register">Register</button>
          </div>

          <form class="admin-form" id="admin-login-form">
            <div class="admin-field">
              <label for="login-email">Email</label>
              <input id="login-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="admin-field">
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <div class="admin-actions">
              <button class="admin-button" type="submit">Login</button>
            </div>
          </form>

          <form class="admin-form is-hidden" id="admin-register-form">
            <div class="admin-field">
              <label for="register-name">Name</label>
              <input id="register-name" name="name" type="text" autocomplete="name" required />
            </div>
            <div class="admin-field">
              <label for="register-email">Email</label>
              <input id="register-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="admin-field">
              <label for="register-phone">Phone</label>
              <input id="register-phone" name="phone" type="tel" autocomplete="tel" />
            </div>
            <div class="admin-field">
              <label for="register-password">Password</label>
              <input id="register-password" name="password" type="password" autocomplete="new-password" required />
            </div>
            <div class="admin-field">
              <label for="register-passkey">Registration Passkey</label>
              <input id="register-passkey" name="passkey" type="password" required />
            </div>
            <div class="admin-actions">
              <button class="admin-button" type="submit">Create Admin</button>
            </div>
          </form>

          <p class="admin-status" id="admin-status" role="status"></p>
        </div>
      </section>
    </main>

    <script src="assets/js/vendor/axios-lite.js"></script>
    <script src="assets/js/api/config.js"></script>
    <script src="assets/js/api/admin.api.js"></script>
    <script src="assets/js/pages/admin.page.js"></script>
  </body>
</html>
