<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Listings Management | Oakline Admin</title>
    <meta name="description" content="Protected Oakline Homes and Realty admin tools for managing property listings." />
    <meta name="author" content="Oakline Homes and Realty" />
    <meta name="application-name" content="Oakline Homes and Realty" />
    <meta name="theme-color" content="#123525" />
    <meta name="robots" content="noindex, nofollow" />
    <meta property="og:site_name" content="Oakline Homes and Realty" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.oaklinehomesrealty.com/admin/listings" />
    <meta property="og:title" content="Listings Management | Oakline Admin" />
    <meta property="og:description" content="Protected Oakline Homes and Realty admin tools for managing property listings." />
    <meta property="og:image" content="https://www.oaklinehomesrealty.com/assets/images/branding/main-logo.png" />
    <meta property="og:image:alt" content="Oakline Homes and Realty logo" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Listings Management | Oakline Admin" />
    <meta name="twitter:description" content="Protected Oakline Homes and Realty admin tools for managing property listings." />
    <meta name="twitter:image" content="https://www.oaklinehomesrealty.com/assets/images/branding/main-logo.png" />
    <link rel="canonical" href="https://www.oaklinehomesrealty.com/admin/listings" />
    <link rel="icon" href="assets/images/branding/icon.png" type="image/png" />
    <link rel="shortcut icon" href="assets/images/branding/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/images/branding/icon.png" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "Oakline Homes and Realty",
        "url": "https://www.oaklinehomesrealty.com/",
        "logo": "https://www.oaklinehomesrealty.com/assets/images/branding/main-logo.png",
        "image": "https://www.oaklinehomesrealty.com/assets/images/branding/main-logo.png",
        "description": "Oakline Homes and Realty helps clients find apartments, homes, listings, tours, and real estate guidance from search to move-in."
      }
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="../" />
    <link rel="stylesheet" href="assets/css/oakline.css" />
    <link rel="stylesheet" href="assets/css/admin.css" />
  </head>
  <body class="admin-body" data-admin-page="listings">
    <main class="admin-shell">
      <section class="admin-brand">
        <div>
          <img src="assets/images/branding/main-logo.png" alt="Oakline Homes and Realty" />
          <h1>Listings</h1>
          <p>Create, update, and delete real estate listings across U.S. markets.</p>
        </div>
        <p class="admin-footnote" id="admin-email-label"></p>
      </section>
      <section class="admin-main">
        <div class="admin-page">
          <header class="admin-page-header">
            <div>
              <h2>Listings</h2>
              <p class="admin-status" id="dashboard-status"></p>
            </div>
            <button class="admin-button secondary" type="button" id="admin-logout">Logout</button>
          </header>
          <nav class="admin-nav">
            <a href="admin/dashboard.html">Dashboard</a>
            <a href="admin/listings.html" class="is-active">Listings</a>
            <a href="admin/leads.html">Leads</a>
            <a href="admin/agents.html">Agents Management</a>
            <a href="admin/account.html">Account</a>
          </nav>
          <div class="admin-content">
            <section class="admin-section">
              <h3>Create / Update Listing</h3>
              <form class="admin-form" id="admin-listing-form" enctype="multipart/form-data">
                <input id="listing-id" name="id" type="hidden" />
                <input id="listing-country" name="country" type="hidden" value="United States" />
                <div class="admin-field">
                  <label for="listing-title">Title</label>
                  <input id="listing-title" name="title" type="text" autocomplete="off" required />
                </div>
                <div class="admin-field">
                  <label for="listing-code">Listing Code</label>
                  <input id="listing-code" name="listing_code" type="text" />
                </div>
                <div class="admin-field">
                  <label for="listing-status">Status</label>
                  <select id="listing-status" name="status">
                    <option value="draft">Draft</option>
                    <option value="active">Active</option>
                    <option value="pending">Pending</option>
                    <option value="sold">Sold</option>
                    <option value="leased">Leased</option>
                    <option value="archived">Archived</option>
                  </select>
                </div>
                <div class="admin-field">
                  <label for="listing-type">Property Type</label>
                  <select id="listing-type" name="property_type">
                    <option value="apartment">Apartment</option>
                    <option value="house">House</option>
                    <option value="townhome">Townhome</option>
                    <option value="condo">Condo</option>
                    <option value="land">Land</option>
                    <option value="commercial">Commercial</option>
                    <option value="other">Other</option>
                  </select>
                </div>
                <div class="admin-field">
                  <label for="listing-market">U.S. Market</label>
                  <select id="listing-market">
                    <option value="">Select a market or enter a custom city below</option>
                    <option value="Houston|TX">Houston, TX</option>
                    <option value="Las Vegas|NV">Las Vegas, NV</option>
                    <option value="Miami|FL">Miami, FL</option>
                    <option value="Dallas|TX">Dallas, TX</option>
                    <option value="Austin|TX">Austin, TX</option>
                    <option value="Atlanta|GA">Atlanta, GA</option>
                    <option value="Charlotte|NC">Charlotte, NC</option>
                    <option value="Chicago|IL">Chicago, IL</option>
                    <option value="Los Angeles|CA">Los Angeles, CA</option>
                    <option value="New York|NY">New York, NY</option>
                    <option value="Phoenix|AZ">Phoenix, AZ</option>
                    <option value="San Diego|CA">San Diego, CA</option>
                    <option value="Seattle|WA">Seattle, WA</option>
                  </select>
                </div>
                <div class="admin-field">
                  <label for="listing-address">Street Address</label>
                  <input
                    id="listing-address"
                    name="address_line_1"
                    type="text"
                    placeholder="3040 Post Oak Blvd"
                    autocomplete="address-line1"
                    required
                  />
                </div>
                <div class="admin-field">
                  <label for="listing-address-2">Unit / Suite</label>
                  <input
                    id="listing-address-2"
                    name="address_line_2"
                    type="text"
                    placeholder="Apt 1204, Suite 600"
                    autocomplete="address-line2"
                  />
                </div>
                <div class="admin-field-row">
                  <div class="admin-field">
                    <label for="listing-city">City</label>
                    <input
                      id="listing-city"
                      name="city"
                      type="text"
                      list="listing-city-options"
                      placeholder="Houston"
                      autocomplete="address-level2"
                      required
                    />
                    <datalist id="listing-city-options">
                      <option value="Houston"></option>
                      <option value="Las Vegas"></option>
                      <option value="Miami"></option>
                      <option value="Dallas"></option>
                      <option value="Austin"></option>
                      <option value="Atlanta"></option>
                      <option value="Charlotte"></option>
                      <option value="Chicago"></option>
                      <option value="Los Angeles"></option>
                      <option value="New York"></option>
                      <option value="Phoenix"></option>
                      <option value="San Diego"></option>
                      <option value="Seattle"></option>
                    </datalist>
                  </div>
                  <div class="admin-field">
                    <label for="listing-state">State</label>
                    <select id="listing-state" name="state" autocomplete="address-level1" required>
                      <option value="">State</option>
                      <option value="AL">AL</option>
                      <option value="AK">AK</option>
                      <option value="AZ">AZ</option>
                      <option value="AR">AR</option>
                      <option value="CA">CA</option>
                      <option value="CO">CO</option>
                      <option value="CT">CT</option>
                      <option value="DE">DE</option>
                      <option value="FL">FL</option>
                      <option value="GA">GA</option>
                      <option value="HI">HI</option>
                      <option value="ID">ID</option>
                      <option value="IL">IL</option>
                      <option value="IN">IN</option>
                      <option value="IA">IA</option>
                      <option value="KS">KS</option>
                      <option value="KY">KY</option>
                      <option value="LA">LA</option>
                      <option value="ME">ME</option>
                      <option value="MD">MD</option>
                      <option value="MA">MA</option>
                      <option value="MI">MI</option>
                      <option value="MN">MN</option>
                      <option value="MS">MS</option>
                      <option value="MO">MO</option>
                      <option value="MT">MT</option>
                      <option value="NE">NE</option>
                      <option value="NV">NV</option>
                      <option value="NH">NH</option>
                      <option value="NJ">NJ</option>
                      <option value="NM">NM</option>
                      <option value="NY">NY</option>
                      <option value="NC">NC</option>
                      <option value="ND">ND</option>
                      <option value="OH">OH</option>
                      <option value="OK">OK</option>
                      <option value="OR">OR</option>
                      <option value="PA">PA</option>
                      <option value="RI">RI</option>
                      <option value="SC">SC</option>
                      <option value="SD">SD</option>
                      <option value="TN">TN</option>
                      <option value="TX">TX</option>
                      <option value="UT">UT</option>
                      <option value="VT">VT</option>
                      <option value="VA">VA</option>
                      <option value="WA">WA</option>
                      <option value="WV">WV</option>
                      <option value="WI">WI</option>
                      <option value="WY">WY</option>
                    </select>
                  </div>
                  <div class="admin-field">
                    <label for="listing-postal-code">ZIP Code</label>
                    <input
                      id="listing-postal-code"
                      name="postal_code"
                      type="text"
                      inputmode="numeric"
                      pattern="[0-9]{5}(-[0-9]{4})?"
                      placeholder="77056"
                      autocomplete="postal-code"
                    />
                  </div>
                </div>
                <div class="admin-field">
                  <label for="listing-price">Price</label>
                  <input id="listing-price" name="price" type="number" min="0" step="1" />
                </div>
                <div class="admin-field">
                  <label for="listing-bedrooms">Bedrooms</label>
                  <input id="listing-bedrooms" name="bedrooms" type="number" min="0" step="0.5" />
                </div>
                <div class="admin-field">
                  <label for="listing-bathrooms">Bathrooms</label>
                  <input id="listing-bathrooms" name="bathrooms" type="number" min="0" step="0.5" />
                </div>
                <div class="admin-field">
                  <label for="listing-square-feet">Square Feet</label>
                  <input id="listing-square-feet" name="square_feet" type="number" min="0" step="1" />
                </div>
                <div class="admin-field">
                  <label for="listing-features">Property Features</label>
                  <textarea
                    id="listing-features"
                    name="features"
                    placeholder="In-unit laundry&#10;Covered parking&#10;Pool access&#10;Pet friendly"
                  ></textarea>
                </div>
                <div class="admin-field">
                  <label for="listing-cover">Cover Image</label>
                  <input id="listing-cover-url" name="cover_image_url" type="hidden" />
                  <input id="listing-cover" name="cover_image_file" type="file" accept="image/*" />
                  <div class="admin-image-preview" id="listing-cover-preview"></div>
                </div>
                <div class="admin-field">
                  <label for="listing-gallery">Gallery Images</label>
                  <input id="listing-gallery" name="gallery_images" type="file" accept="image/*" multiple />
                  <div class="admin-image-grid" id="listing-gallery-preview"></div>
                </div>
                <div class="admin-field">
                  <label for="listing-description">Description</label>
                  <textarea id="listing-description" name="description"></textarea>
                </div>
                <div class="admin-actions">
                  <button class="admin-button" type="submit">Save Listing</button>
                  <button class="admin-button secondary" type="button" id="listing-form-reset">Clear</button>
                </div>
              </form>
            </section>
            <section class="admin-section">
              <h3>Saved Listings</h3>
              <div class="admin-list" id="admin-listings-list"></div>
            </section>
          </div>
        </div>
      </section>
    </main>
    <script src="assets/js/vendor/axios-lite.js"></script>
    <script src="assets/js/api/config.js"></script>
    <script src="assets/js/api/admin.api.js"></script>
    <script src="assets/js/pages/admin.page.js"></script>
  </body>
</html>
