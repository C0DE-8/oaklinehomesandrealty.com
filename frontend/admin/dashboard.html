<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base href="../" />
    <title>Dashboard | Oakline Admin</title>
    <link rel="icon" href="assets/images/branding/favicon.png" type="image/png" />
    <link rel="stylesheet" href="assets/css/oakline.css" />
    <link rel="stylesheet" href="assets/css/admin.css" />
  </head>
  <body class="admin-body" data-admin-page="dashboard">
    <main class="admin-shell">
      <section class="admin-brand">
        <div>
          <img src="assets/images/branding/main-logo.png" alt="Oakline Homes and Realty" />
          <h1>Dashboard</h1>
          <p id="admin-email-label">Loading account...</p>
        </div>
        <p class="admin-footnote">Oakline Homes and Realty admin.</p>
      </section>
      <section class="admin-main">
        <div class="admin-page">
          <header class="admin-page-header">
            <div>
              <h2 id="dashboard-title">Dashboard</h2>
              <p class="admin-status" id="dashboard-status"></p>
            </div>
            <button class="admin-button secondary" type="button" id="admin-logout">Logout</button>
          </header>
          <nav class="admin-nav">
            <a href="admin/dashboard.html" class="is-active">Dashboard</a>
            <a href="admin/listings.html">Listings</a>
            <a href="admin/agents.html">Agents Management</a>
            <a href="admin/account.html">Account</a>
          </nav>
          <div class="admin-content">
            <section class="admin-section full">
              <h3>Overview</h3>
              <div class="metric-grid">
                <div class="metric">
                  <strong id="metric-active-listings">0</strong>
                  <span>Active Listings</span>
                </div>
                <div class="metric">
                  <strong id="metric-new-leads">0</strong>
                  <span>New Leads</span>
                </div>
                <div class="metric">
                  <strong id="metric-saved-users">0</strong>
                  <span>Saved Users</span>
                </div>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>
    <script src="assets/js/vendor/axios-lite.js"></script>
    <script src="assets/js/api/config.js"></script>
    <script src="assets/js/api/admin.api.js"></script>
    <script src="assets/js/pages/admin.page.js"></script>
  </body>
</html>
