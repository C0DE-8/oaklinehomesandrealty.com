<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>404 | Page Not Found</title>
    <meta
      content="The page you are looking for could not be found."
      name="description"
    />
    <meta content="404 | Page Not Found" property="og:title" />
    <meta
      content="The page you are looking for could not be found."
      property="og:description"
    />
    <meta property="og:type" content="website" />
    <meta content="summary_large_image" name="twitter:card" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link href="assets/css/oakline.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/" rel="preconnect" />
    <link href="https://fonts.gstatic.com/" rel="preconnect" crossorigin="anonymous" />
    <script src="assets/js/vendor/webfont-loader.js" type="text/javascript"></script>
    <script type="text/javascript">
      WebFont.load({ google: { families: ["Manrope:300,400,500,600,700"] } });
    </script>
    <link
      href="assets/images/branding/favicon.png"
      rel="shortcut icon"
      type="image/x-icon"
    />
    <link href="assets/images/branding/favicon.png" rel="apple-touch-icon" />
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .not-found-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
        background: #f8fbf4;
      }

      .not-found-content {
        width: min(720px, 100%);
        text-align: center;
      }

      .not-found-logo {
        width: min(220px, 70vw);
        margin-bottom: 44px;
      }

      .not-found-kicker {
        margin-bottom: 12px;
        color: #468c50;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .not-found-title {
        margin: 0 0 18px;
        color: #123525;
        font-size: clamp(42px, 9vw, 84px);
        line-height: 1;
        letter-spacing: 0;
      }

      .not-found-copy {
        max-width: 560px;
        margin: 0 auto 30px;
        color: #617067;
        font-size: 18px;
        line-height: 1.6;
      }

      .not-found-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .not-found-secondary {
        border: 1px solid rgba(18, 53, 37, 0.18);
        color: #123525;
        background: #ffffff;
      }

      @media screen and (max-width: 479px) {
        .not-found-page {
          padding: 36px 16px;
        }

        .not-found-copy {
          font-size: 16px;
        }

        .not-found-actions .w-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="not-found-page">
      <section class="not-found-content" aria-labelledby="not-found-title">
        <a href="/" aria-label="Oakline Homes and Realty home">
          <img
            src="assets/images/branding/main-logo.png"
            alt="Oakline Homes and Realty"
            class="not-found-logo"
          />
        </a>
        <div class="not-found-kicker">404 error</div>
        <h1 id="not-found-title" class="not-found-title">Page not found</h1>
        <p class="not-found-copy">
          The page may have moved, or the link may be broken. Head back home or
          browse available apartment listings.
        </p>
        <div class="not-found-actions">
          <a href="/" class="button w-button">Go Home</a>
          <a href="/listings" class="button not-found-secondary w-button">View Listings</a>
        </div>
      </section>
    </main>
  </body>
</html>
