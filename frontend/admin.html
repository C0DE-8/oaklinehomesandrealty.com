<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Portal | Oakline Homes and Realty</title>
    <link rel="icon" href="assets/images/branding/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/images/branding/apple-touch-icon.png" />
    <link rel="stylesheet" href="assets/css/oakline.css" />
    <style>
      :root {
        --admin-green: #468c50;
        --admin-green-dark: #123525;
        --admin-green-soft: #f4fbec;
        --admin-lime: #aad25a;
        --admin-ink: #17231c;
        --admin-muted: #617067;
        --admin-line: rgba(18, 53, 37, 0.14);
        --admin-bg: #f8faf6;
      }

      body {
        min-height: 100vh;
        color: var(--admin-ink);
        background: var(--admin-bg);
        font-family: Manrope, Arial, sans-serif;
      }

      .admin-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(280px, 420px) 1fr;
      }

      .admin-brand {
        color: #fff;
        background:
          linear-gradient(rgba(18, 53, 37, 0.84), rgba(18, 53, 37, 0.9)),
          url("assets/images/home/building-exterior.jpg") center / cover;
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .admin-brand img {
        width: 220px;
        max-height: 80px;
        object-fit: contain;
        background: #fff;
        border-radius: 8px;
        padding: 10px 14px;
      }

      .admin-brand h1 {
        max-width: 340px;
        margin: 80px 0 16px;
        font-size: 42px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .admin-brand p,
      .admin-footnote {
        max-width: 360px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        line-height: 1.7;
      }

      .admin-main {
        padding: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .admin-panel,
      .admin-dashboard {
        width: min(100%, 760px);
        background: #fff;
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        box-shadow: 0 24px 70px rgba(18, 53, 37, 0.08);
      }

      .admin-panel {
        max-width: 480px;
        padding: 28px;
      }

      .admin-dashboard {
        display: none;
        overflow: hidden;
      }

      body.is-authenticated .admin-panel {
        display: none;
      }

      body.is-authenticated .admin-dashboard {
        display: block;
      }

      .admin-panel-header,
      .dashboard-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .admin-panel h2,
      .dashboard-header h2 {
        margin: 0;
        font-size: 26px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .admin-status {
        min-height: 24px;
        margin: 14px 0 0;
        color: var(--admin-muted);
        font-size: 14px;
      }

      .admin-status.is-error {
        color: #a9342b;
      }

      .admin-status.is-success {
        color: var(--admin-green-dark);
      }

      .admin-tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        padding: 4px;
        background: var(--admin-green-soft);
        border-radius: 8px;
      }

      .admin-tab,
      .admin-link-button {
        border: 0;
        background: transparent;
        color: var(--admin-green-dark);
      }

      .admin-tab {
        min-height: 40px;
        border-radius: 6px;
        font-weight: 700;
      }

      .admin-tab.is-active {
        color: #fff;
        background: var(--admin-green);
      }

      .admin-form {
        display: grid;
        gap: 14px;
      }

      .admin-form.is-hidden {
        display: none;
      }

      .admin-field {
        display: grid;
        gap: 7px;
      }

      .admin-field label {
        color: var(--admin-muted);
        font-size: 13px;
        font-weight: 700;
      }

      .admin-field input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--admin-line);
        border-radius: 7px;
        padding: 10px 12px;
        color: var(--admin-ink);
        background: #fff;
      }

      .admin-field input:focus {
        outline: 3px solid rgba(170, 210, 90, 0.28);
        border-color: var(--admin-green);
      }

      .admin-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 4px;
      }

      .admin-button {
        min-height: 46px;
        border: 1px solid var(--admin-green);
        border-radius: 7px;
        padding: 10px 16px;
        color: #fff;
        background: var(--admin-green);
        font-weight: 800;
      }

      .admin-button:hover {
        color: #fff;
        background: #5fa764;
        border-color: #5fa764;
      }

      .admin-button.secondary {
        color: var(--admin-green-dark);
        background: #fff;
        border-color: var(--admin-line);
      }

      .dashboard-header {
        margin: 0;
        padding: 24px 28px;
        border-bottom: 1px solid var(--admin-line);
      }

      .dashboard-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        padding: 28px;
      }

      .dashboard-section {
        border: 1px solid var(--admin-line);
        border-radius: 8px;
        padding: 18px;
      }

      .dashboard-section.full {
        grid-column: 1 / -1;
      }

      .dashboard-section h3 {
        margin: 0 0 16px;
        font-size: 17px;
        letter-spacing: 0;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .metric {
        min-height: 86px;
        display: grid;
        align-content: center;
        gap: 6px;
        padding: 14px;
        border-radius: 8px;
        background: var(--admin-green-soft);
      }

      .metric strong {
        font-size: 24px;
        color: var(--admin-green-dark);
      }

      .metric span {
        color: var(--admin-muted);
        font-size: 13px;
        font-weight: 700;
      }

      @media (max-width: 860px) {
        .admin-shell {
          grid-template-columns: 1fr;
        }

        .admin-brand {
          min-height: 280px;
          padding: 28px;
        }

        .admin-brand h1 {
          margin-top: 48px;
          font-size: 34px;
        }

        .admin-main {
          padding: 20px;
        }

        .dashboard-body,
        .metric-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="admin-shell">
      <section class="admin-brand" aria-label="Oakline Homes and Realty">
        <div>
          <img src="assets/images/branding/main-logo.png" alt="Oakline Homes and Realty" />
          <h1>Admin Portal</h1>
          <p>Manage Oakline Homes and Realty operations, leads, listings, and account access.</p>
        </div>
        <p class="admin-footnote">Protected access for Oakline administrators.</p>
      </section>

      <section class="admin-main">
        <div class="admin-panel">
          <div class="admin-panel-header">
            <h2>Admin Access</h2>
          </div>

          <div class="admin-tabs" role="tablist" aria-label="Admin forms">
            <button class="admin-tab is-active" type="button" data-admin-tab="login">Login</button>
            <button class="admin-tab" type="button" data-admin-tab="register">Register</button>
          </div>

          <form class="admin-form" id="admin-login-form">
            <div class="admin-field">
              <label for="login-email">Email</label>
              <input id="login-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="admin-field">
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <div class="admin-actions">
              <button class="admin-button" type="submit">Login</button>
            </div>
          </form>

          <form class="admin-form is-hidden" id="admin-register-form">
            <div class="admin-field">
              <label for="register-name">Name</label>
              <input id="register-name" name="name" type="text" autocomplete="name" required />
            </div>
            <div class="admin-field">
              <label for="register-email">Email</label>
              <input id="register-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="admin-field">
              <label for="register-phone">Phone</label>
              <input id="register-phone" name="phone" type="tel" autocomplete="tel" />
            </div>
            <div class="admin-field">
              <label for="register-password">Password</label>
              <input id="register-password" name="password" type="password" autocomplete="new-password" required />
            </div>
            <div class="admin-field">
              <label for="register-passkey">Registration Passkey</label>
              <input id="register-passkey" name="passkey" type="password" required />
            </div>
            <div class="admin-actions">
              <button class="admin-button" type="submit">Create Admin</button>
            </div>
          </form>

          <p class="admin-status" id="admin-status" role="status"></p>
        </div>

        <div class="admin-dashboard">
          <header class="dashboard-header">
            <div>
              <h2 id="dashboard-title">Dashboard</h2>
              <p class="admin-status" id="dashboard-status"></p>
            </div>
            <button class="admin-button secondary" type="button" id="admin-logout">Logout</button>
          </header>

          <div class="dashboard-body">
            <section class="dashboard-section full">
              <h3>Overview</h3>
              <div class="metric-grid">
                <div class="metric">
                  <strong>0</strong>
                  <span>Active Listings</span>
                </div>
                <div class="metric">
                  <strong>0</strong>
                  <span>New Leads</span>
                </div>
                <div class="metric">
                  <strong>0</strong>
                  <span>Saved Users</span>
                </div>
              </div>
            </section>

            <section class="dashboard-section">
              <h3>Profile</h3>
              <form class="admin-form" id="admin-profile-form">
                <div class="admin-field">
                  <label for="profile-name">Name</label>
                  <input id="profile-name" name="name" type="text" required />
                </div>
                <div class="admin-field">
                  <label for="profile-phone">Phone</label>
                  <input id="profile-phone" name="phone" type="tel" />
                </div>
                <div class="admin-actions">
                  <button class="admin-button" type="submit">Save Profile</button>
                </div>
              </form>
            </section>

            <section class="dashboard-section">
              <h3>Password</h3>
              <form class="admin-form" id="admin-password-form">
                <div class="admin-field">
                  <label for="current-password">Current Password</label>
                  <input id="current-password" name="currentPassword" type="password" autocomplete="current-password" required />
                </div>
                <div class="admin-field">
                  <label for="new-password">New Password</label>
                  <input id="new-password" name="newPassword" type="password" autocomplete="new-password" required />
                </div>
                <div class="admin-actions">
                  <button class="admin-button" type="submit">Update Password</button>
                </div>
              </form>
            </section>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/js/admin.js"></script>
  </body>
</html>
